<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="search.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 55%;
      padding: 14px 20px;
      margin: 10px 0 0;
      background: linear-gradient(135deg, blue, #4caf50);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      text-align: left;
    }

    .section-toggle:nth-of-type(1) {
  background: linear-gradient(135deg, #2e7d32, #4caf50);
}
.section-toggle:nth-of-type(2) {
  background: linear-gradient(135deg, #1565c0, #42a5f5);
}
.section-toggle:nth-of-type(3) {
  background: linear-gradient(135deg, #6a1b9a, #ab47bc);
}
.section-toggle:nth-of-type(4) {
  background: linear-gradient(135deg, #ef6c00, #ffa726);
}

    .section-toggle .arrow {
      transition: transform 0.3s ease;
      font-style: normal;
      font-size: 0.85rem;
    }

    .section-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .section-toggle.open {
      border-radius: 10px 10px 0 0;
    }

    .collapsible-section {
      display: none;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 20px;
      background: #fff;
      margin-bottom: 6px;
    }

    .collapsible-section.open {
      display: block;
    }

    #dashboardWrap {
      padding: 0 16px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

  <!-- TOP LOGO BAR -->
  <header class="top-navbar">
    <div class="top-logo">
      <img src="rahmangrow_logo.svg" alt="RahmanGrow Logo">
    </div>
  </header>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html"></a>
    </div>
    <ul class="nav-links" id="nav-links">
      <li>
        <a href="index.html">
          <i class="fas fa-house"></i>
          <span>Home</span>
        </a>
      </li>
    </ul>
  </nav>

  <div id="dashboardWrap">

    <h2>Seller Dashboard</h2>
    <button id="logoutBtn">Logout</button>
    <button id="exportSubs">Export Emails</button>

    

    <!-- ── CATEGORY MANAGER ── -->
    <button class="section-toggle" data-target="categorySection">
      <span><i class="fas fa-tags" style="margin-right:8px;"></i>Manage Categories</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-section" id="categorySection">
      <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; align-items:center;">
        <input id="catName" type="text" placeholder="Category name (e.g. Electronics)"
          style="padding:8px; border:1px solid #ccc; border-radius:6px; min-width:180px;" />
        <button type="button" id="addCatBtn"
          style="padding:8px 16px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer;">
          + Add Category
        </button>
      </div>
      <div id="categoryList" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    </div>

    <!-- ── ADD PRODUCT ── -->
    <button class="section-toggle" data-target="productSection">
      <span><i class="fas fa-plus-circle" style="margin-right:8px;"></i>Add Product</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-section" id="productSection">
      <form id="productForm">
        <input type="text" id="name" placeholder="Product Name" required>
        <input type="number" id="price" min="0" step="0.01" placeholder="e.g. 3.50" required>
        <select id="currency" required>
          <option value="GHS">₵ GHS</option>
          <option value="USD">$ USD</option>
          <option value="EUR">€ EUR</option>
          <option value="GBP">£ GBP</option>
        </select>
        <input type="number" id="stock" placeholder="Stock quantity" required>
        <input type="file" id="imageFile" accept="image/*">
        <input type="number" id="discount" min="0" max="100" placeholder="Discount % (e.g. 20)" />
        <input type="text" id="cartLink" placeholder="Add to Cart link (e.g. shop.html)" />
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Select category</option>
          </select>
        </div>
        <img id="preview" width="80" style="display:block; margin:10px 0;">
        <button type="submit">Add Product</button>
      </form>
    </div>

    <!-- ── PROMO MANAGER ── -->
    <button class="section-toggle" data-target="promoSection">
      <span><i class="fas fa-percentage" style="margin-right:8px;"></i>Manage Promo</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-section" id="promoSection">
      <div style="overflow-x:auto; margin-top:10px;">
        <table border="1" style="width:100%; border-collapse:collapse; font-size:14px;">
          <thead>
            <tr style="background:#f3f4f6;">
              <th style="padding:8px;">Image</th>
              <th style="padding:8px;">Name</th>
              <th style="padding:8px;">Price</th>
              <th style="padding:8px;">Discount</th>
              <th style="padding:8px;">Stock</th>
              <th style="padding:8px;">Active</th>
              <th style="padding:8px;">Actions</th>
            </tr>
          </thead>
          <tbody id="promoTable"></tbody>
        </table>
      </div>
    </div>

    <!-- ── STOCK & ANALYTICS ── -->
    <button class="section-toggle" data-target="analyticsSection">
      <span><i class="fas fa-chart-bar" style="margin-right:8px;"></i>Stock &amp; Analytics</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-section" id="analyticsSection">
      <div id="lowStockAlerts"></div>
      <div id="stockManager" style="margin-top:10px;"></div>
      <div id="analytics" style="margin-top:10px;"></div>
    </div>

    <!-- ── ORDERS ── -->
    <button class="section-toggle" data-target="ordersSection">
      <span><i class="fas fa-receipt" style="margin-right:8px;"></i>Orders</span>
      <span class="arrow">▼</span>
    </button>
    <div class="collapsible-section" id="ordersSection">
      <button id="deleteSelectedBtn">🗑 Delete Selected Orders</button>
      <div style="overflow-x:auto; margin-top:10px;">
        <table border="1" width="100%">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll"></th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Address</th>
              <th>Items</th>
              <th>Total (₵)</th>
              <th>Payment Status</th>
              <th>Delivery Status</th>
              <th>Date/Time</th>
            </tr>
          </thead>
          <tbody id="orders-table"></tbody>
        </table>
      </div>
    </div>

  </div><!-- end dashboardWrap -->

  <!-- SCRIPTS -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="dashboard.js"></script>
  

  <!-- CATEGORY MANAGER SCRIPT -->
  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, onSnapshot, doc, setDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const catNameInput = document.getElementById("catName");
    const addCatBtn    = document.getElementById("addCatBtn");
    const catList      = document.getElementById("categoryList");
    const catSelect    = document.getElementById("category");

    onSnapshot(collection(db, "categories"), (snapshot) => {
      catList.innerHTML = "";
      const prevValue = catSelect.value;
      catSelect.innerHTML = `<option value="" disabled selected>Select category</option>`;

      snapshot.forEach((docSnap) => {
        const cat = { id: docSnap.id, ...docSnap.data() };

        const tag = document.createElement("div");
        tag.style.cssText = "display:inline-flex; align-items:center; gap:6px; padding:4px 12px; background:#e8f0fe; border:1px solid #93c5fd; border-radius:20px; font-size:13px;";
        tag.innerHTML = `
          <span>${cat.name}</span>
          <span data-id="${cat.id}" data-name="${cat.name}"
            style="cursor:pointer; color:#dc2626; font-size:16px; line-height:1;">&times;</span>
        `;
        tag.querySelector("span[data-id]").addEventListener("click", async (e) => {
          if (!confirm(`Delete category "${e.target.dataset.name}"?`)) return;
          await deleteDoc(doc(db, "categories", e.target.dataset.id));
        });
        catList.appendChild(tag);

        const option = document.createElement("option");
        option.value       = cat.slug;
        option.textContent = cat.name;
        catSelect.appendChild(option);
      });

      if (prevValue) catSelect.value = prevValue;
    });

    async function addCategory() {
      const name = catNameInput?.value?.trim();
      if (!name) { catNameInput?.focus(); return; }
      const slug = name.toLowerCase().replace(/\s+/g, "-");
      try {
        await setDoc(doc(db, "categories", slug), { name, slug, createdAt: new Date() });
        catNameInput.value = "";
      } catch (err) {
        console.error(err);
        alert("Failed to add category ❌");
      }
    }

    addCatBtn.addEventListener("click", addCategory);
    catNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); addCategory(); }
    });
  </script>

  <!-- PROMO MANAGER SCRIPT -->
  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const promoTable = document.getElementById("promoTable");

    onSnapshot(collection(db, "promotions"), (snapshot) => {
      promoTable.innerHTML = "";

      if (snapshot.empty) {
        promoTable.innerHTML = `
          <tr>
            <td colspan="7" style="text-align:center; padding:16px; color:#888;">
              No promotions yet
            </td>
          </tr>`;
        return;
      }

      snapshot.forEach((docSnap) => {
        const p      = { id: docSnap.id, ...docSnap.data() };
        const symbol = p.currency === "USD" ? "$" : p.currency === "EUR" ? "€" : p.currency === "GBP" ? "£" : "₵";

        const row = document.createElement("tr");
        row.innerHTML = `
          <td style="padding:8px; text-align:center;">
            <img src="${p.imageURL || p.imageUrl || 'images/no-image.png'}"
              style="width:60px; height:60px; object-fit:cover; border-radius:6px;">
          </td>
          <td style="padding:8px;">${p.name || "—"}</td>
          <td style="padding:8px;">${symbol}${p.price || 0}</td>
          <td style="padding:8px; color:#dc2626; font-weight:bold;">
            ${p.discount ? p.discount + "% OFF" : "—"}
          </td>
          <td style="padding:8px;">${p.stock ?? "—"}</td>
          <td style="padding:8px; text-align:center;">
            <input type="checkbox" ${p.active ? "checked" : ""}
              onchange="togglePromoActive('${p.id}', this.checked)"
              title="${p.active ? 'Active' : 'Inactive'}">
          </td>
          <td style="padding:8px; white-space:nowrap;">
            <button onclick="editPromo('${p.id}')"
              style="margin-right:6px; padding:5px 10px; background:#2563eb; color:#fff; border:none; border-radius:5px; cursor:pointer;">
              ✏️ Edit
            </button>
            <button onclick="deletePromo('${p.id}', '${(p.name || '').replace(/'/g, "\\'")}')"
              style="padding:5px 10px; background:#dc2626; color:#fff; border:none; border-radius:5px; cursor:pointer;">
              🗑 Delete
            </button>
          </td>
        `;
        promoTable.appendChild(row);
      });
    });

    window.togglePromoActive = async (id, active) => {
      try {
        await updateDoc(doc(db, "promotions", id), { active });
      } catch (err) {
        console.error(err);
        alert("Failed to update status ❌");
      }
    };

    window.editPromo = async (id) => {
      try {
        const snap = await getDoc(doc(db, "promotions", id));
        if (!snap.exists()) return alert("Promo not found ❌");
        const p = snap.data();
        const newName     = prompt("Name:", p.name || "");
        if (!newName) return;
        const newPrice    = prompt("Price:", p.price || 0);
        const newDiscount = prompt("Discount % (0 for none):", p.discount || 0);
        const newStock    = prompt("Stock:", p.stock || 0);
        const newCartLink = prompt("Cart link:", p.cartLink || "shop.html");
        await updateDoc(doc(db, "promotions", id), {
          name:     newName.trim(),
          price:    Number(newPrice) || 0,
          discount: Number(newDiscount) || 0,
          stock:    Number(newStock) || 0,
          cartLink: newCartLink?.trim() || "shop.html"
        });
        alert("Promo updated ✅");
      } catch (err) {
        console.error(err);
        alert("Failed to update ❌");
      }
    };

    window.deletePromo = async (id, name) => {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        await deleteDoc(doc(db, "promotions", id));
        alert("Deleted 🗑️");
      } catch (err) {
        console.error(err);
        alert("Failed to delete ❌");
      }
    };
  </script>

  <!-- TOGGLE + MENU SCRIPT -->
  <script>
    // Section accordion toggles
    document.querySelectorAll(".section-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.target);
        const isOpen = target.classList.toggle("open");
        btn.classList.toggle("open", isOpen);
      });
    });

    // Mobile menu toggle
    document.addEventListener("DOMContentLoaded", () => {
      const toggle   = document.getElementById("menu-toggle");
      const navLinks = document.getElementById("nav-links");
      if (!toggle || !navLinks) return;
      toggle.addEventListener("click", () => navLinks.classList.toggle("active"));
    });
  </script>

</body>
</html>
